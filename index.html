<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Tuner • Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
       
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title { font-family: 'Space Grotesk', sans-serif; }
       
        .tuner-circle {
            width: 300px;
            height: 300px;
            border-radius: 9999px;
            background: conic-gradient(#22c55e 0deg 180deg, #ef4444 180deg 360deg);
            position: relative;
            box-shadow: 0 0 70px rgba(34, 197, 94, 0.25);
        }
       
        .needle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 130px;
            background: linear-gradient(#fff, #ef4444);
            transform-origin: bottom center;
            border-radius: 9999px;
            transition: transform 0.08s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.5);
        }
       
        .string-slot {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
       
        .string-slot.active {
            transform: scale(1.08);
            box-shadow: 0 0 25px #22c55e;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white overflow-hidden">
    <div class="flex h-screen">
        <!-- LEFT: DROP TUNINGS -->
        <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <div class="p-6 border-b border-zinc-800">
                <h2 class="title text-3xl font-semibold tracking-tighter text-emerald-400">DROP TUNINGS</h2>
                <p class="text-zinc-400 text-sm mt-1">Click any to load</p>
            </div>
            <div id="drop-list" class="flex-1 overflow-auto p-4 space-y-3"></div>
        </div>

        <!-- CENTER: TUNER -->
        <div class="flex-1 flex flex-col items-center justify-center bg-zinc-950 relative">
            <!-- Header area -->
            <div class="absolute top-6 left-8 flex items-center gap-3 z-20">
                <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
                <h1 class="title text-4xl font-bold tracking-tighter">[KMRN] TUNER</h1>
            </div>

            <!-- Microphone button -->
            <button onclick="toggleMic()"
                    id="mic-btn"
                    class="absolute top-5 left-96 px-6 py-3 bg-emerald-600 hover:bg-emerald-500 transition-all rounded-2xl font-semibold text-base flex items-center gap-2 shadow-xl shadow-emerald-900/50 z-20">
                <span id="mic-text">START MIC</span>
                <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m-.5-15a3.5 3.5 0 10-7 0v4a3.5 3.5 0 007 0V6z" />
                </svg>
            </button>

            <!-- Main Tuner Content -->
            <div class="relative flex flex-col items-center mt-[-20px]">
                <!-- Big Circle Tuner -->
                <div id="tuner-circle" class="tuner-circle flex items-center justify-center">
                    <div class="relative w-72 h-72 flex items-center justify-center">
                        <div id="needle" class="needle" style="transform: rotate(-90deg);"></div>
                        <div class="text-center z-10">
                            <div id="note-name" class="title text-8xl font-bold tracking-tighter text-white leading-none">E</div>
                            <div id="octave" class="text-4xl text-zinc-400 -mt-3">4</div>
                        </div>
                    </div>
                </div>

                <!-- Cents & Freq - made slightly smaller and tighter spacing -->
                <div class="mt-6 flex gap-10 text-center">
                    <div>
                        <div class="text-xs uppercase tracking-widest text-zinc-500 mb-1">CENTS</div>
                        <div id="cents" class="text-5xl font-mono font-semibold tabular-nums text-emerald-400">+00</div>
                    </div>
                    <div>
                        <div class="text-xs uppercase tracking-widest text-zinc-500 mb-1">FREQUENCY</div>
                        <div id="frequency" class="text-5xl font-mono font-semibold tabular-nums text-white">82.4</div>
                        <div class="text-xs text-zinc-500">Hz</div>
                    </div>
                </div>
            </div>

            <!-- Current Tuning Name - moved up & smaller -->
            <div class="absolute bottom-5 text-center">
                <div class="text-emerald-400 text-xs tracking-widest"></div>
                <div id="current-tuning-name" class="title text-3xl font-semibold text-white">Standard</div>
            </div>

            <!-- String targets - moved up & slightly smaller -->
            <div id="string-targets" class="absolute bottom-16 flex gap-5"></div>
        </div>

        <!-- RIGHT: PITCH SHIFTER -->
        <div class="w-80 bg-zinc-900 border-l border-zinc-800 p-6 flex flex-col">
            <div class="mb-6">
                <h2 class="title text-3xl font-semibold tracking-tighter text-amber-400">PITCH SHIFTER</h2>
                <p class="text-zinc-400 text-sm">Simulate any drop without retuning</p>
            </div>
            <div class="mb-6">
                <label class="block text-xs uppercase tracking-widest text-zinc-400 mb-2">YOUR PHYSICAL TUNING</label>
                <select id="physical-select" onchange="updateEffective()"
                        class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-lg focus:outline-none focus:border-amber-400">
                </select>
            </div>
            <div>
                <div class="flex justify-between text-sm mb-2">
                    <span class="text-zinc-400">SEMITONES</span>
                    <span id="semitone-value" class="font-mono text-3xl font-bold text-amber-400">0</span>
                </div>
                <input type="range" id="semitone-slider" min="-12" max="12" value="0" step="1"
                       oninput="updateEffective()" class="w-full accent-amber-400">
            </div>
            <div class="mt-8">
                <div class="text-xs uppercase tracking-widest text-zinc-400 mb-3">EFFECTIVE TUNING AFTER SHIFT</div>
                <div id="effective-display" class="grid grid-cols-3 gap-3 text-center"></div>
            </div>
            <button onclick="loadEffectiveAsCurrent()"
                    class="mt-auto bg-amber-500 hover:bg-amber-400 transition-all py-5 rounded-3xl font-semibold text-lg">
                LOAD THIS AS CURRENT TUNING
            </button>
            <div class="mt-6 text-[10px] text-zinc-500 text-center">
                Works with laptop mic • Best in Chrome
            </div>
        </div>
    </div>

    <script>
        tailwind.config = { content: [], theme: { extend: {} } }

        let allDropTunings = [
            { id: "dropd",    name: "Drop D",     notes: ["D2","A2","D3","G3","B3","E4"] },
            { id: "dropdb",   name: "Drop C♯/D♭", notes: ["C#2","G#2","C#3","F#3","A#3","D#4"] },
            { id: "dropc",    name: "Drop C",     notes: ["C2","G2","C3","F3","A3","D4"] },
            { id: "dropb",    name: "Drop B",     notes: ["B1","F#2","B2","E3","G#3","C#4"] },
            { id: "dropbb",   name: "Drop A♯/B♭", notes: ["A#1","F2","A#2","D#3","G3","C4"] },
            { id: "dropa",    name: "Drop A",     notes: ["A1","E2","A2","D3","F#3","B3"] },
            { id: "dropab",   name: "Drop G♯/A♭", notes: ["G#1","D#2","G#2","C#3","F3","A#3"] },
            { id: "dropg",    name: "Drop G",     notes: ["G1","D2","G2","C3","F3","A3"] },
            { id: "dropgb",   name: "Drop F♯/G♭", notes: ["F#1","C#2","F#2","B2","D#3","G#3"] },
            { id: "dropf",    name: "Drop F",     notes: ["F1","C2","F2","A#2","D3","G3"] },
            { id: "drope",    name: "Drop E",     notes: ["E1","B1","E2","A2","C#3","F#3"] }
        ];

        let allTuningsForSelect = [
            { id: "standard", name: "Standard", notes: ["E2","A2","D3","G3","B3","E4"] },
            ...allDropTunings
        ];

        let currentTuning = allTuningsForSelect[0];
        let isListening = false;
        let audioContext, analyser, mediaStream, rafId;
        let buf = new Float32Array(2048);

        const noteNames = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

        function noteToMidi(noteStr) {
            const match = noteStr.match(/^([A-G]#?)([0-8])$/);
            if (!match) return 0;
            const [, letter, octave] = match;
            return noteNames.indexOf(letter) + (parseInt(octave) + 1) * 12;
        }

        function midiToNote(midi) {
            const octave = Math.floor(midi / 12) - 1;
            return noteNames[midi % 12] + octave;
        }

        function transposeNote(noteStr, semitones) {
            return midiToNote(noteToMidi(noteStr) + semitones);
        }

        function freqToMidi(freq) {
            return 69 + 12 * Math.log2(freq / 440);
        }

        function midiToFreq(midi) {
            return 440 * Math.pow(2, (midi - 69) / 12);
        }

        function autoCorrelate(buffer, sampleRate) {
            const SIZE = buffer.length;
            const MAX_SAMPLES = Math.floor(SIZE / 2);
            let best_offset = -1, best_correlation = 0, rms = 0, foundGood = false;
            for (let i = 0; i < SIZE; i++) rms += buffer[i] * buffer[i];
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.012) return -1;

            let last = 1;
            for (let offset = 0; offset < MAX_SAMPLES; offset++) {
                let corr = 0;
                for (let i = 0; i < MAX_SAMPLES; i++) corr += Math.abs(buffer[i] - buffer[i + offset]);
                corr = 1 - (corr / MAX_SAMPLES);
                if (corr > 0.9 && corr > last) {
                    foundGood = true;
                    if (corr > best_correlation) { best_correlation = corr; best_offset = offset; }
                } else if (foundGood) break;
                last = corr;
            }
            return (best_correlation > 0.01 && best_offset > 0) ? sampleRate / best_offset : -1;
        }

        function renderDropList() {
            const c = document.getElementById("drop-list");
            c.innerHTML = "";
            allDropTunings.forEach(t => {
                const d = document.createElement("div");
                d.className = `bg-zinc-800 hover:bg-zinc-700 cursor-pointer rounded-3xl p-5 transition-all ${currentTuning.id === t.id ? 'ring-2 ring-emerald-400' : ''}`;
                d.innerHTML = `<div class="font-semibold text-xl">${t.name}</div>
                    <div class="grid grid-cols-6 gap-1 mt-3 text-[10px] text-zinc-400 font-mono">
                        ${t.notes.map(n => `<div class="text-center">${n}</div>`).join("")}
                    </div>`;
                d.onclick = () => {
                    currentTuning = t;
                    renderDropList();
                    renderStringTargets();
                    document.getElementById("current-tuning-name").textContent = t.name;
                };
                c.appendChild(d);
            });
        }

        function renderStringTargets() {
            const c = document.getElementById("string-targets");
            c.innerHTML = "";
            currentTuning.notes.forEach((note, i) => {
                const d = document.createElement("div");
                d.className = "string-slot bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-2.5 text-center min-w-[68px]";
                d.innerHTML = `<div class="text-emerald-400 text-xs">STR ${6-i}</div>
                               <div class="text-2xl font-mono font-bold">${note}</div>`;
                c.appendChild(d);
            });
        }

        function renderPhysicalSelect() {
            const s = document.getElementById("physical-select");
            s.innerHTML = "";
            allTuningsForSelect.forEach(t => {
                const o = document.createElement("option");
                o.value = t.id; o.textContent = t.name;
                if (t.id === "standard") o.selected = true;
                s.appendChild(o);
            });
        }

        function updateEffective() {
            const pid = document.getElementById("physical-select").value;
            const semi = parseInt(document.getElementById("semitone-slider").value);
            document.getElementById("semitone-value").textContent = semi > 0 ? `+${semi}` : semi;

            const pt = allTuningsForSelect.find(t => t.id === pid);
            if (!pt) return;

            const eff = pt.notes.map(n => transposeNote(n, semi));
            const c = document.getElementById("effective-display");
            c.innerHTML = "";
            eff.forEach(note => {
                const d = document.createElement("div");
                d.className = "bg-zinc-800 rounded-2xl py-3 text-center font-mono text-xl font-bold";
                d.textContent = note;
                c.appendChild(d);
            });
        }

        function loadEffectiveAsCurrent() {
            const pid = document.getElementById("physical-select").value;
            const semi = parseInt(document.getElementById("semitone-slider").value);
            const pt = allTuningsForSelect.find(t => t.id === pid);
            const eff = pt.notes.map(n => transposeNote(n, semi));

            currentTuning = { id: "custom", name: `Shifted ${pt.name} (${semi})`, notes: eff };
            renderDropList();
            renderStringTargets();
            document.getElementById("current-tuning-name").textContent = currentTuning.name;
        }

        function updateTunerDisplay(freq) {
            if (freq < 60) return;
            const midi = Math.round(freqToMidi(freq));
            const noteIdx = midi % 12;
            const oct = Math.floor(midi / 12) - 1;
            const note = noteNames[noteIdx];

            const target = midiToFreq(midi);
            const cents = Math.round(1200 * Math.log2(freq / target));

            document.getElementById("note-name").textContent = note;
            document.getElementById("octave").textContent = oct;
            document.getElementById("cents").textContent = (cents >= 0 ? "+" : "") + cents;
            document.getElementById("frequency").textContent = freq.toFixed(1);

            const rot = Math.max(Math.min(cents * 0.9, 45), -45) + 90;
            document.getElementById("needle").style.transform = `rotate(${rot}deg)`;

            const el = document.getElementById("cents");
            el.className = Math.abs(cents) < 5 ? "text-5xl font-mono font-semibold tabular-nums text-emerald-400" :
                           Math.abs(cents) < 15 ? "text-5xl font-mono font-semibold tabular-nums text-amber-400" :
                           "text-5xl font-mono font-semibold tabular-nums text-red-400";
        }

        async function startMic() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaStream = stream;
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 4096;
                source.connect(analyser);

                isListening = true;
                document.getElementById("mic-text").textContent = "LISTENING...";
                document.getElementById("mic-btn").classList.add("!bg-red-600");
                pitchDetectionLoop();
            } catch(e) {
                alert("Microphone access denied or unavailable.\nTry Chrome + allow mic.");
            }
        }

        function stopMic() {
            if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
            if (rafId) cancelAnimationFrame(rafId);
            isListening = false;
            document.getElementById("mic-text").textContent = "START MIC";
            document.getElementById("mic-btn").classList.remove("!bg-red-600");
        }

        function toggleMic() {
            isListening ? stopMic() : startMic();
        }

        function pitchDetectionLoop() {
            rafId = requestAnimationFrame(pitchDetectionLoop);
            analyser.getFloatTimeDomainData(buf);
            const pitch = autoCorrelate(buf, audioContext.sampleRate);
            if (pitch > 60 && pitch < 1500) updateTunerDisplay(pitch);
        }

        function init() {
            renderDropList();
            renderStringTargets();
            renderPhysicalSelect();
            updateEffective();
            document.getElementById("current-tuning-name").textContent = currentTuning.name;
            console.log("%cGuitar tuner ready – click START MIC", "color:#22c55e");
        }

        window.onload = init;
    </script>
</body>
</html>
